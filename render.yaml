services:
  - type: web
    name: carrera-run
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REDIRECT_URI
        sync: false
      - key: STRAVA_SCOPES
        value: read,activity:read_all
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: carrera_run
